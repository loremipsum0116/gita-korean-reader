<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>바가바드 기타 한글 전자책</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #e5ece5;
        --panel: #f4f8f2;
        --paper: #fffdf5;
        --paper-edge: #ded2bd;
        --paper-line: rgba(46, 42, 35, 0.11);
        --ink: #27231f;
        --muted: #6f7069;
        --accent: #8f2f42;
        --accent-2: #236e68;
        --gold: #a7781f;
        --shadow: rgba(38, 31, 24, 0.24);
        --reader-font: 20px;
        --radius: 8px;
      }

      [data-theme="night"] {
        color-scheme: dark;
        --bg: #16211f;
        --panel: #1d2a27;
        --paper: #252520;
        --paper-edge: #494236;
        --paper-line: rgba(239, 229, 214, 0.12);
        --ink: #f1e7d6;
        --muted: #baaea0;
        --accent: #df8996;
        --accent-2: #77c7b8;
        --gold: #d5ae5e;
        --shadow: rgba(0, 0, 0, 0.44);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-serif, Georgia, "Apple SD Gothic Neo", "Noto Serif KR", "Nanum Myeongjo", serif;
        letter-spacing: 0;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.38;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(220px, 360px) auto;
        align-items: center;
        gap: 14px;
        border-bottom: 1px solid var(--paper-line);
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        padding: 14px 18px;
      }

      .brand {
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: 1.18rem;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand p {
        margin: 4px 0 0;
        overflow: hidden;
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.82rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chapter-select {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--paper-line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        padding: 10px 12px;
        outline: none;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        display: inline-grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid var(--paper-line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        color: var(--ink);
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      }

      .icon-btn:hover:not(:disabled) {
        border-color: color-mix(in srgb, var(--accent-2) 40%, var(--paper-line));
        background: var(--paper);
        transform: translateY(-1px);
      }

      .icon-btn svg {
        width: 19px;
        height: 19px;
      }

      .font-control {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 42px;
        min-width: 154px;
        border: 1px solid var(--paper-line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        padding: 0 10px;
      }

      .font-control input {
        width: 94px;
        accent-color: var(--accent-2);
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 22px 18px 14px;
      }

      .book-shell {
        position: relative;
        display: grid;
        width: min(820px, 100%);
        height: min(72vh, 780px);
        min-height: 520px;
        perspective: 1600px;
      }

      .book-shell::before {
        content: "";
        position: absolute;
        inset: 18px -10px -16px;
        border-radius: var(--radius);
        background: rgba(58, 46, 35, 0.18);
        filter: blur(14px);
      }

      .book-page {
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--paper-edge);
        border-radius: var(--radius);
        background:
          linear-gradient(var(--paper-line) 1px, transparent 1px) 0 5.1rem / 100% 2.18rem,
          var(--paper);
        box-shadow: 0 28px 70px var(--shadow);
        transform-origin: center;
      }

      .book-page.enter-next {
        animation: pageInNext 260ms ease both;
      }

      .book-page.enter-prev {
        animation: pageInPrev 260ms ease both;
      }

      @keyframes pageInNext {
        from {
          opacity: 0.35;
          transform: translateX(34px) rotateY(-7deg);
        }
        to {
          opacity: 1;
          transform: translateX(0) rotateY(0);
        }
      }

      @keyframes pageInPrev {
        from {
          opacity: 0.35;
          transform: translateX(-34px) rotateY(7deg);
        }
        to {
          opacity: 1;
          transform: translateX(0) rotateY(0);
        }
      }

      .turn-zone {
        position: absolute;
        top: 0;
        bottom: 0;
        z-index: 4;
        width: 50%;
        border: 0;
        background: transparent;
      }

      .turn-zone.left {
        left: 0;
      }

      .turn-zone.right {
        right: 0;
      }

      .page-content {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        padding: 54px 66px 42px;
        font-size: var(--reader-font);
        line-height: 1.78;
      }

      .page-content h1,
      .page-content h2,
      .page-content h3,
      .page-content p,
      .page-content hr {
        margin-top: 0;
      }

      .page-content h1 {
        margin-bottom: 28px;
        color: var(--accent);
        font-size: 1.45em;
        line-height: 1.28;
      }

      .page-content h2 {
        margin-bottom: 18px;
        color: var(--accent-2);
        font-size: 1.02em;
        line-height: 1.35;
      }

      .page-content p {
        margin-bottom: 1.05em;
        word-break: keep-all;
      }

      .page-content strong {
        color: color-mix(in srgb, var(--ink) 90%, var(--accent));
        font-weight: 800;
      }

      .page-content .speaker {
        color: var(--accent-2);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.88em;
        font-weight: 800;
      }

      .page-content .bullet {
        position: relative;
        padding-left: 1.1em;
      }

      .page-content .bullet::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.78em;
        width: 0.35em;
        height: 0.35em;
        border-radius: 50%;
        background: var(--gold);
      }

      .page-content hr {
        height: 1px;
        margin: 28px 0;
        border: 0;
        background: var(--paper-line);
      }

      .page-footer {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        border-top: 1px solid var(--paper-line);
        background: color-mix(in srgb, var(--paper) 82%, transparent);
        padding: 12px 66px;
      }

      .page-footer span {
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.82rem;
      }

      .page-footer .page-number {
        color: var(--accent);
        font-weight: 800;
      }

      .page-footer .hint-right {
        justify-self: end;
      }

      .progress-wrap {
        width: min(820px, 100%);
        margin: 16px auto 0;
      }

      .progress {
        width: 100%;
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: color-mix(in srgb, var(--paper-line) 72%, transparent);
      }

      .progress-bar {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent-2), var(--gold));
        transition: width 180ms ease;
      }

      .loading {
        display: grid;
        place-items: center;
        min-height: 260px;
        color: var(--muted);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .measuring-page {
        position: fixed;
        left: -9999px;
        top: 0;
        z-index: -1;
        visibility: hidden;
      }

      @media (max-width: 820px) {
        .topbar {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .brand p {
          white-space: normal;
        }

        .controls {
          justify-content: space-between;
        }

        .font-control {
          flex: 1;
          min-width: 0;
        }

        .font-control input {
          width: 100%;
        }

        .stage {
          padding: 14px 10px 12px;
        }

        .book-shell {
          height: calc(100vh - 246px);
          min-height: 430px;
        }

        .page-content {
          padding: 34px 26px 28px;
          line-height: 1.74;
        }

        .page-content h1 {
          font-size: 1.28em;
        }

        .page-footer {
          grid-template-columns: 1fr;
          gap: 5px;
          padding: 10px 26px;
          text-align: center;
        }

        .page-footer .hint-left,
        .page-footer .hint-right {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .book-shell {
          height: calc(100vh - 236px);
          min-height: 390px;
        }

        .page-content {
          padding: 28px 22px 24px;
        }
      }
    </style>
  </head>
  <body data-theme="day">
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <h1>바가바드 기타</h1>
          <p id="chapterLabel">한글 전자책을 준비하고 있습니다.</p>
        </div>

        <select class="chapter-select" id="chapterSelect" aria-label="장 선택"></select>

        <div class="controls">
          <button class="icon-btn" id="musicButton" type="button" title="음악 재생" aria-label="음악 재생">
            <i data-lucide="volume-2"></i>
          </button>
          <label class="font-control" title="글자 크기">
            <i data-lucide="type"></i>
            <input id="fontSize" type="range" min="17" max="25" value="20" aria-label="글자 크기">
          </label>
          <button class="icon-btn" id="themeButton" type="button" title="야간 모드" aria-label="야간 모드">
            <i data-lucide="moon"></i>
          </button>
        </div>
      </header>

      <section class="stage" aria-live="polite">
        <div class="book-shell" id="bookShell">
          <article class="book-page" id="bookPage">
            <div class="page-content" id="pageContent">
              <div class="loading">책장을 펼치고 있습니다.</div>
            </div>
            <footer class="page-footer">
              <span class="hint-left">왼쪽을 누르면 이전 페이지</span>
              <span class="page-number" id="pageNumber">0 / 0</span>
              <span class="hint-right">오른쪽을 누르면 다음 페이지</span>
            </footer>
          </article>
          <button class="turn-zone left" id="prevZone" type="button" aria-label="이전 페이지"></button>
          <button class="turn-zone right" id="nextZone" type="button" aria-label="다음 페이지"></button>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </section>
    </main>

    <audio id="music" src="assets/focus-music.mp3" preload="metadata" loop></audio>

    <script>
      const chapterFiles = Array.from({ length: 18 }, (_, index) => {
        const number = String(index + 1).padStart(2, "0");
        return `chapters/chapter-${number}.md`;
      });

      const state = {
        page: 0,
        fontSize: Number(localStorage.getItem("ebook-font-size")) || 20,
        theme: localStorage.getItem("ebook-theme") || "day",
        isMusicPlaying: false
      };

      const elements = {};
      let blocks = [];
      let pages = [];
      let pageChapters = [];
      let chapters = [];
      let touchStartX = 0;
      let touchStartY = 0;
      let pointerStartX = 0;
      let pointerStartY = 0;
      let suppressClickUntil = 0;
      let resizeTimer = null;

      document.addEventListener("DOMContentLoaded", init);

      async function init() {
        cacheElements();
        applyPreferences();
        bindEvents();
        refreshIcons();
        await loadBook();
        paginateAndRender();
      }

      function cacheElements() {
        [
          "chapterLabel",
          "chapterSelect",
          "musicButton",
          "fontSize",
          "themeButton",
          "bookShell",
          "bookPage",
          "pageContent",
          "pageNumber",
          "progressBar",
          "prevZone",
          "nextZone",
          "music"
        ].forEach((id) => {
          elements[id] = document.getElementById(id);
        });
      }

      function applyPreferences() {
        document.body.dataset.theme = state.theme;
        document.documentElement.style.setProperty("--reader-font", `${state.fontSize}px`);
        elements.fontSize.value = state.fontSize;
        updateThemeButton();
      }

      function bindEvents() {
        elements.prevZone.addEventListener("click", () => {
          if (Date.now() > suppressClickUntil) {
            previousPage();
          }
        });
        elements.nextZone.addEventListener("click", () => {
          if (Date.now() > suppressClickUntil) {
            nextPage();
          }
        });
        elements.musicButton.addEventListener("click", toggleMusic);
        elements.themeButton.addEventListener("click", toggleTheme);
        elements.fontSize.addEventListener("input", handleFontChange);
        elements.chapterSelect.addEventListener("change", () => {
          goToPage(firstPageForChapter(elements.chapterSelect.value), "next");
        });

        elements.bookShell.addEventListener("touchstart", (event) => {
          const touch = event.changedTouches[0];
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
        }, { passive: true });

        elements.bookShell.addEventListener("touchend", (event) => {
          const touch = event.changedTouches[0];
          const dx = touch.clientX - touchStartX;
          const dy = touch.clientY - touchStartY;
          handleSwipe(dx, dy);
        }, { passive: true });

        elements.bookShell.addEventListener("pointerdown", (event) => {
          if (!event.isPrimary) {
            return;
          }
          pointerStartX = event.clientX;
          pointerStartY = event.clientY;
        });

        elements.bookShell.addEventListener("pointerup", (event) => {
          if (!event.isPrimary) {
            return;
          }
          handleSwipe(event.clientX - pointerStartX, event.clientY - pointerStartY);
        });

        document.addEventListener("keydown", (event) => {
          if (event.target.matches("input, select, textarea")) {
            return;
          }
          if (event.key === "ArrowLeft") {
            previousPage();
          }
          if (event.key === "ArrowRight" || event.key === " ") {
            nextPage();
          }
        });

        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            const ratio = pages.length ? state.page / pages.length : 0;
            paginateAndRender(Math.floor(ratio * pages.length));
          }, 180);
        });

        elements.music.addEventListener("play", () => {
          state.isMusicPlaying = true;
          updateMusicButton();
        });

        elements.music.addEventListener("pause", () => {
          state.isMusicPlaying = false;
          updateMusicButton();
        });
      }

      async function loadBook() {
        const texts = await Promise.all(chapterFiles.map(async (path) => {
          const response = await fetch(path);
          if (!response.ok) {
            throw new Error(`${path} 파일을 불러오지 못했습니다.`);
          }
          return response.text();
        }));

        blocks = texts.flatMap((text, index) => parseMarkdown(text, index + 1));
        chapters = blocks
          .filter((block) => block.type === "chapterTitle")
          .map((block) => ({ id: block.chapter, title: block.text }));

        elements.chapterSelect.replaceChildren(
          ...chapters.map((chapter) => {
            const option = document.createElement("option");
            option.value = String(chapter.id);
            option.textContent = chapter.title;
            return option;
          })
        );
      }

      function parseMarkdown(markdown, chapterNumber) {
        const normalized = markdown.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const lines = normalized.split("\n");
        const parsed = [];
        let paragraph = [];

        const flushParagraph = () => {
          const text = paragraph.join(" ").trim();
          if (text) {
            parsed.push({ type: "p", chapter: chapterNumber, text });
          }
          paragraph = [];
        };

        lines.forEach((rawLine) => {
          const line = rawLine.trim();
          if (!line) {
            flushParagraph();
            return;
          }
          if (/^-{3,}$/.test(line)) {
            flushParagraph();
            parsed.push({ type: "hr", chapter: chapterNumber });
            return;
          }
          if (line.startsWith("# ")) {
            flushParagraph();
            parsed.push({ type: "chapterTitle", chapter: chapterNumber, text: line.replace(/^#\s+/, "") });
            return;
          }
          if (line.startsWith("## ")) {
            flushParagraph();
            parsed.push({ type: "h2", chapter: chapterNumber, text: line.replace(/^##\s+/, "") });
            return;
          }
          if (line.startsWith("* ")) {
            flushParagraph();
            parsed.push({ type: "bullet", chapter: chapterNumber, text: line.replace(/^\*\s+/, "") });
            return;
          }
          paragraph.push(line);
        });

        flushParagraph();
        return parsed;
      }

      function paginateAndRender(preferredPage = state.page) {
        const previousChapter = pageChapters[state.page]?.id;
        pages = paginateBlocks(blocks);
        pageChapters = pages.map((_, pageIndex) => chapterForPage(pageIndex));

        if (previousChapter && preferredPage === state.page) {
          preferredPage = Math.max(0, firstPageForChapter(previousChapter));
        }
        state.page = clamp(preferredPage, 0, Math.max(0, pages.length - 1));
        renderPage();
      }

      function paginateBlocks(sourceBlocks) {
        const visibleRect = elements.pageContent.getBoundingClientRect();
        const measurer = document.createElement("div");
        measurer.className = "measuring-page";
        measurer.style.width = `${visibleRect.width}px`;
        measurer.style.height = `${visibleRect.height}px`;

        const content = document.createElement("div");
        content.className = "page-content";
        content.style.width = "100%";
        content.style.height = "100%";
        measurer.appendChild(content);
        document.body.appendChild(measurer);

        const result = [];
        let current = [];

        sourceBlocks.forEach((block) => {
          if (block.type === "hr" && !current.length) {
            return;
          }

          if (fits(content, [...current, block])) {
            current.push(block);
            return;
          }

          if (current.length) {
            result.push(current);
            current = [];
          }

          if (fits(content, [block])) {
            current.push(block);
            return;
          }

          if (block.type === "p") {
            const splitPages = splitParagraph(content, block);
            result.push(...splitPages.slice(0, -1));
            current = splitPages.at(-1) || [];
            return;
          }

          result.push([block]);
        });

        if (current.length) {
          result.push(current);
        }

        measurer.remove();
        return result.length ? result : [[]];
      }

      function fits(content, pageBlocks) {
        renderBlocks(content, pageBlocks);
        return content.scrollHeight <= content.clientHeight + 2;
      }

      function splitParagraph(content, block) {
        const units = block.text.split(/(\s+)/).filter(Boolean);
        const splitPages = [];
        let chunk = "";

        units.forEach((unit) => {
          const next = chunk + unit;
          if (fits(content, [{ ...block, text: next.trim() }])) {
            chunk = next;
            return;
          }

          if (chunk.trim()) {
            splitPages.push([{ ...block, text: chunk.trim() }]);
            chunk = unit.trimStart();
          } else {
            splitPages.push([{ ...block, text: unit.trim() }]);
            chunk = "";
          }
        });

        if (chunk.trim()) {
          splitPages.push([{ ...block, text: chunk.trim() }]);
        }

        return splitPages;
      }

      function renderPage(direction = "next") {
        const pageBlocks = pages[state.page] || [];
        renderBlocks(elements.pageContent, pageBlocks);

        const currentChapter = pageChapters[state.page] || chapters[0];
        elements.chapterLabel.textContent = currentChapter?.title || "";
        elements.chapterSelect.value = String(currentChapter?.id || 1);
        elements.pageNumber.textContent = `${state.page + 1} / ${pages.length}`;
        elements.progressBar.style.width = `${((state.page + 1) / pages.length) * 100}%`;
        elements.prevZone.disabled = state.page <= 0;
        elements.nextZone.disabled = state.page >= pages.length - 1;

        elements.bookPage.classList.remove("enter-next", "enter-prev");
        void elements.bookPage.offsetWidth;
        elements.bookPage.classList.add(direction === "prev" ? "enter-prev" : "enter-next");
      }

      function renderBlocks(container, pageBlocks) {
        container.replaceChildren(...pageBlocks.map(createElementForBlock));
      }

      function createElementForBlock(block) {
        if (block.type === "chapterTitle") {
          const heading = document.createElement("h1");
          heading.textContent = block.text;
          return heading;
        }

        if (block.type === "h2") {
          const heading = document.createElement("h2");
          heading.textContent = block.text;
          return heading;
        }

        if (block.type === "hr") {
          return document.createElement("hr");
        }

        const paragraph = document.createElement("p");
        if (block.type === "bullet") {
          paragraph.className = "bullet";
        }

        const speaker = block.text.match(/^\*\*(.+)\*\*$/);
        if (speaker) {
          paragraph.className = "speaker";
          paragraph.textContent = speaker[1];
          return paragraph;
        }

        paragraph.innerHTML = inlineMarkdown(block.text);
        return paragraph;
      }

      function inlineMarkdown(text) {
        return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      }

      function escapeHtml(text) {
        const element = document.createElement("div");
        element.textContent = text;
        return element.innerHTML;
      }

      function chapterForPage(pageIndex) {
        let chapter = chapters[0];
        for (let index = 0; index <= pageIndex; index += 1) {
          const titleBlock = pages[index]?.find((block) => block.type === "chapterTitle");
          if (titleBlock) {
            chapter = { id: titleBlock.chapter, title: titleBlock.text };
          }
        }
        return chapter;
      }

      function firstPageForChapter(chapterId) {
        const target = Number(chapterId);
        const index = pages.findIndex((page) => page.some((block) => block.type === "chapterTitle" && block.chapter === target));
        return index >= 0 ? index : 0;
      }

      function previousPage() {
        goToPage(state.page - 1, "prev");
      }

      function nextPage() {
        goToPage(state.page + 1, "next");
      }

      function handleSwipe(dx, dy) {
        if (Math.abs(dx) < 48 || Math.abs(dx) < Math.abs(dy)) {
          return;
        }
        suppressClickUntil = Date.now() + 500;
        if (dx > 0) {
          previousPage();
        } else {
          nextPage();
        }
      }

      function goToPage(pageIndex, direction) {
        const next = clamp(pageIndex, 0, pages.length - 1);
        if (next === state.page) {
          return;
        }
        state.page = next;
        renderPage(direction);
      }

      async function toggleMusic() {
        if (elements.music.paused) {
          try {
            await elements.music.play();
          } catch (error) {
            state.isMusicPlaying = false;
            updateMusicButton();
          }
        } else {
          elements.music.pause();
        }
      }

      function updateMusicButton() {
        elements.musicButton.title = state.isMusicPlaying ? "음악 멈추기" : "음악 재생";
        elements.musicButton.setAttribute("aria-label", elements.musicButton.title);
        elements.musicButton.innerHTML = state.isMusicPlaying
          ? "<i data-lucide=\"pause\"></i>"
          : "<i data-lucide=\"volume-2\"></i>";
        refreshIcons();
      }

      function toggleTheme() {
        state.theme = state.theme === "night" ? "day" : "night";
        localStorage.setItem("ebook-theme", state.theme);
        document.body.dataset.theme = state.theme;
        updateThemeButton();
      }

      function updateThemeButton() {
        elements.themeButton.title = state.theme === "night" ? "밝은 모드" : "야간 모드";
        elements.themeButton.setAttribute("aria-label", elements.themeButton.title);
        elements.themeButton.innerHTML = state.theme === "night"
          ? "<i data-lucide=\"sun\"></i>"
          : "<i data-lucide=\"moon\"></i>";
        refreshIcons();
      }

      function handleFontChange() {
        state.fontSize = Number(elements.fontSize.value);
        localStorage.setItem("ebook-font-size", String(state.fontSize));
        document.documentElement.style.setProperty("--reader-font", `${state.fontSize}px`);
        paginateAndRender(state.page);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function refreshIcons() {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }
    </script>
  </body>
</html>
